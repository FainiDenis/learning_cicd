name: Create local user

on:
  workflow_dispatch:

jobs:
  create-user:
    runs-on: ubuntu-latest
    steps:
      - name: Create group & user on runner
        run: |
          set -euo pipefail

          TARGET_GROUP="myGROUP"
          TARGET_USER="myUSER1"
          USER_HOME="/home/${TARGET_USER}"

          # create group if not exists
          if ! getent group "${TARGET_GROUP}" >/dev/null; then
            sudo groupadd --force "${TARGET_GROUP}"
          fi

          # create user if not exists (with home, primary group, bash shell)
          if ! id -u "${TARGET_USER}" >/dev/null 2>&1; then
            sudo useradd -m -s /bin/bash -g "${TARGET_GROUP}" "${TARGET_USER}"
            sudo passwd -l "${TARGET_USER}"  # lock password by default
          else
            # ensure primary group is set
            sudo usermod -g "${TARGET_GROUP}" "${TARGET_USER}" || true
          fi

          # add to sudo group (optional)
          if ! id -nG "${TARGET_USER}" | grep -qw "sudo"; then
            sudo usermod -aG sudo "${TARGET_USER}"
          fi

          # ensure home dir exists with correct permissions
          sudo mkdir -p "${USER_HOME}"
          sudo chown "${TARGET_USER}:${TARGET_GROUP}" "${USER_HOME}"
          sudo chmod 700 "${USER_HOME}"

          echo "User ${TARGET_USER} and group ${TARGET_GROUP} ensured."
